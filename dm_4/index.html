<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- //mouse events -->
    <button onclick="onClick()">onClick</button>
    <button onmouseover="onMouseOver()">onMouseOver</button>
    <button onmouseout="onMouseOut()">onMouseOut</button>
    <button onmousedown="onMouseDown()">onMouseDown</button>
    <button onmouseup="onMouseUp()">onMouseUp</button>
    <button onmousemove="onMouseMove()">onMouseMove</button>
    <button ondblclick="ondblclick()">ondbblclick</button>

    <!-- //keyboard events -->
    <button onkeydown="onKeyDown()">onKeyDown</button>
    <button onkeyup="onKeyUp()">onKeyUp</button>
    <!-- //form events -->
    <button onfocus="onFocus()">onFocus</button>
    <button onsubmit="onSubmit()">onSubmit</button>
    <button onblur="onBlur()">onBlur</button>
    <button onchange="onChange()">onChange</button> //important for select tag
    <!-- //window events -->
    <button onload="onLoad()">onLoad</button>
    <button onunload="onUnload()">onUnload</button>
    <button onresize="onResize()">onResize</button>
    <script src="./script.js"></script>
</body>
</html>
